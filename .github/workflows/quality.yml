name: Quality checks

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, dom, gd, mbstring, pdo_mysql, zip
          coverage: none
      - name: Lint PHP
        run: find app database public scripts tests -type f -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Run native test suite
        run: php tests/run.php

  javascript:
    name: JavaScript syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check JavaScript syntax
        run: find public/assets/js -type f -name '*.js' -print0 | xargs -0 -n1 node --check
